<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version Status - Simple & Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Main Glassmorphism Styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            /* Translucent background */
            backdrop-filter: blur(20px);
            /* High blur for frosted glass effect */
            -webkit-backdrop-filter: blur(20px);

            /* Subtle glass border */
            border: 1px solid rgba(255, 255, 255, 0.4);

            /* Soft wide shadow for depth */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .btn-trigger {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-trigger:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body class="bg-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute w-60 h-60 bg-blue-100/50 rounded-full blur-3xl -top-20 -left-20"></div>
    <div class="absolute w-60 h-60 bg-purple-100/50 rounded-full blur-3xl -bottom-20 -right-20"></div>

    <div class="glass-card max-w-sm w-full rounded-[2.5rem] p-10 text-center relative z-10">

        <div
            class="inline-flex items-center gap-2.5 bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-xs font-medium mb-8">
            <span class="relative flex h-2.5 w-2.5">
                <span
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-blue-600"></span>
            </span>
            SYSTEM ONLINE
        </div>

        <h2 class="text-slate-500 text-base mb-2">This application is running on version</h2>
        <h1 class="text-6xl font-bold text-slate-950 tracking-tighter mb-8">
            1.0
        </h1>

        <div class="w-1/3 h-px bg-slate-200 mx-auto"></div>

        <p id="status-text" class="mt-4 text-[10px] text-slate-400 uppercase tracking-widest">Ready to capture</p>
    </div>

</body>

</html>
